# service-map.yaml
# 维护服务与模板关系，供 workflow 编排和文档索引使用。
#
# 每个服务应包含：
#   ports: 常用端口列表
#   fingerprint: 指纹模板路径列表
#   checks:
#     safe: 低风险只读模板路径列表
#     optional: 有锁定/告警风险的模板路径列表
#   tags: 服务分类标签

tomcat:
  ports: [8080]
  fingerprint:
    - fingerprints/http/middleware/tomcat-detect.yaml
  checks:
    safe:
      - http/exposures/git-config-exposed.yaml
    optional:
      - http/default-logins/tomcat-manager-mini-brute.yaml
  tags: [middleware, web]

spring-boot:
  ports: [8080, 8081]
  fingerprint:
    - fingerprints/http/middleware/spring-boot-detect.yaml
  checks:
    safe:
      - http/exposures/spring-boot-actuator-exposed.yaml
      - http/exposures/swagger-ui-exposed.yaml
    optional: []
  tags: [middleware, web]

