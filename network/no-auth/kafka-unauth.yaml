id: kafka-unauth

info:
  name: Kafka Unauthenticated Topic Enumeration
  author: internal-audit
  severity: medium
  description: Detects Kafka broker without ACL allowing topic metadata enumeration.
  metadata:
    max-request: 1
  tags: network,kafka,no-auth,internal-audit,safe

tcp:
  - inputs:
      - data: "\x00\x00\x00\x1c\x00\x00\x00\x01\x00\x12\x00\x04\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 9092
    matchers:
      - type: word
        part: raw
        words:
          - "Kafka"
