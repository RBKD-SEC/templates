# Source: https://github.com/projectdiscovery/nuclei-templates/blob/main/network/misconfiguration/redis-unauth.yaml
# Modified: 仅使用 INFO 只读探测，不执行破坏性命令

id: redis-no-auth

info:
  name: Redis No Authentication
  author: pdteam
  severity: high
  description: Detects Redis instance without authentication via INFO command (read-only).
  metadata:
    max-request: 1
  tags: network,redis,no-auth

tcp:
  - inputs:
      - data: "INFO\r\n"
        read: 2048
    host:
      - "{{Hostname}}"
    port: 6379
    matchers:
      - type: word
        part: raw
        words:
          - "redis_version"
      - type: word
        part: raw
        words:
          - "NOAUTH"
        negative: true
