id: memcached-unauth

info:
  name: Memcached Unauthenticated Access
  author: internal
  severity: medium
  description: Detects Memcached without authentication via stats command (read-only).
  metadata:
    max-request: 1
  tags: network,memcached,no-auth

tcp:
  - inputs:
      - data: "stats\n"
        read: 2048
    host:
      - "{{Hostname}}"
    port: 11211
    matchers:
      - type: word
        part: raw
        words:
          - "STAT pid"
          - "STAT uptime"
        condition: and
