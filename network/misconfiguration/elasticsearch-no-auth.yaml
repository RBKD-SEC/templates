# Source: https://github.com/projectdiscovery/nuclei-templates/blob/main/http/misconfiguration/unauth-elastic.yaml
# Modified: 改为 network 协议直接探测 9200 端口，只读

id: elasticsearch-no-auth

info:
  name: Elasticsearch No Authentication
  author: pdteam
  severity: high
  description: Detects Elasticsearch without authentication via cluster health API.
  metadata:
    max-request: 1
  tags: network,elasticsearch,no-auth

tcp:
  - inputs:
      - data: "GET /_cluster/health HTTP/1.1\r\nHost: {{Hostname}}\r\n\r\n"
        read: 2048
    host:
      - "{{Hostname}}"
    port: 9200
    matchers:
      - type: word
        part: raw
        words:
          - '"cluster_name"'
          - '"status"'
        condition: and
