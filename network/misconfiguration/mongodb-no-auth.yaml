id: mongodb-no-auth

info:
  name: MongoDB No Authentication
  author: internal
  severity: high
  description: Detects MongoDB instance without authentication via isMaster command (read-only).
  metadata:
    max-request: 1
  tags: network,mongodb,no-auth

tcp:
  - inputs:
      - data: "\x3d\x00\x00\x00\x01\x00\x00\x00\x00\x00\x00\x00\xd4\x07\x00\x00\x00\x00\x00\x00\x61\x64\x6d\x69\x6e\x2e\x24\x63\x6d\x64\x00\x00\x00\x00\x00\xff\xff\xff\xff\x13\x00\x00\x00\x10\x69\x73\x4d\x61\x73\x74\x65\x72\x00\x01\x00\x00\x00\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 27017
    matchers:
      - type: word
        part: raw
        words:
          - "ismaster"
          - "maxBsonObjectSize"
        condition: and
