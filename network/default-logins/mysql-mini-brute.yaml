id: mysql-mini-brute

info:
  name: MySQL Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default MySQL credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: network,mysql,default-login,database,internal-audit,optional

javascript:
  - code: |
      let m = require("nuclei/mysql");
      let c = m.MySQLClient();
      c.Connect(Host, Port, Username, Password);
    args:
      Host: "{{Host}}"
      Port: "3306"
      Username: "{{username}}"
      Password: "{{password}}"
    threads: 1
    attack: pitchfork
    stop-at-first-match: true
    payloads:
      username:
        - root
        - admin
      password:
        - root
        - admin123
    matchers:
      - type: dsl
        dsl:
          - "response == true"
          - "success == true"
        condition: and
