id: kingbase-mini-brute

info:
  name: KingBaseES Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default KingBaseES (人大金仓) credentials using a minimal 2-user x 2-password dictionary.
    KingBaseES is PostgreSQL wire-compatible. Uses nuclei/postgres module.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: network,default-login,kingbase,database,internal-audit,optional

javascript:
  - code: |
      let m = require("nuclei/postgres");
      let c = m.PostgresClient();
      c.Connect(Host, Port, Username, Password, Database);
    args:
      Host: "{{Host}}"
      Port: "54321"
      Username: "{{username}}"
      Password: "{{password}}"
      Database: "test"
    threads: 1
    delay: 2s
    attack: pitchfork
    stop-at-first-match: true
    payloads:
      username:
        - system
        - admin
      password:
        - manager
        - admin123
    matchers:
      - type: dsl
        dsl:
          - "response == true"
          - "success == true"
        condition: and
