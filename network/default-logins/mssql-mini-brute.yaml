id: mssql-mini-brute

info:
  name: MSSQL Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Microsoft SQL Server credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: network,mssql,default-login,database,internal-audit,optional

javascript:
  - code: |
      let m = require("nuclei/mssql");
      let c = m.MSSQLClient();
      c.Connect(Host, Port, Username, Password);
    args:
      Host: "{{Host}}"
      Port: "1433"
      Username: "{{username}}"
      Password: "{{password}}"
    threads: 1
    delay: 2s
    attack: pitchfork
    stop-at-first-match: true
    payloads:
      username:
        - sa
        - admin
      password:
        - sa
        - admin123
    matchers:
      - type: dsl
        dsl:
          - "response == true"
          - "success == true"
        condition: and
