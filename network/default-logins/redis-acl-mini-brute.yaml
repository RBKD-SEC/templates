id: redis-acl-mini-brute

info:
  name: Redis ACL Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Redis credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: network,redis,default-login,database,internal-audit,optional

tcp:
  - inputs:
      - data: "AUTH {{password}}\r\n"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 6379
    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      password:
        - redis
        - admin123
    matchers:
      - type: word
        part: raw
        words:
          - "+OK"

      - type: word
        part: raw
        words:
          - "NOAUTH"
          - "invalid password"
        negative: true
        condition: or
