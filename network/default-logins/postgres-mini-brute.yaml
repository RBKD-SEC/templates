id: postgres-mini-brute

info:
  name: PostgreSQL Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default PostgreSQL credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: network,postgres,default-login,database

javascript:
  - code: |
      let m = require("nuclei/postgres");
      let c = m.PostgresClient();
      c.Connect(Host, Port, Username, Password, Database);
    args:
      Host: "{{Host}}"
      Port: "5432"
      Username: "{{username}}"
      Password: "{{password}}"
      Database: "postgres"
    threads: 1
    attack: pitchfork
    stop-at-first-match: true
    payloads:
      username:
        - postgres
        - admin
      password:
        - postgres
        - admin123
    matchers:
      - type: dsl
        dsl:
          - "response == true"
          - "success == true"
        condition: and
