id: iec104-detect

info:
  name: IEC 60870-5-104 Detect
  author: internal
  severity: info
  description: Detects IEC 104 (IEC 60870-5-104) SCADA protocol via StartDT activation.
  metadata:
    max-request: 1
  tags: fingerprint,network,ics,iec104

tcp:
  - inputs:
      - data: "\x68\x04\x07\x00\x00\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 2404
    matchers:
      - type: word
        part: raw
        words:
          - "\x68\x04\x0b"
