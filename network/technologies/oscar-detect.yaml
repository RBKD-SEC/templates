id: oscar-detect

info:
  name: OSCAR Database Detect
  author: internal
  severity: info
  description: Detects OSCAR (神通) database service via TCP banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,oscar,database

tcp:
  - inputs:
      - data: "\n"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 2003
    matchers:
      - type: word
        part: raw
        words:
          - "OSCAR"
          - "shentong"
        condition: or
