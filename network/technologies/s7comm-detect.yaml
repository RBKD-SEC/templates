id: s7comm-detect

info:
  name: S7comm Detect
  author: internal
  severity: info
  description: Detects Siemens S7comm protocol via COTP Connection Request on ISO-TSAP (port 102).
  metadata:
    max-request: 1
  tags: fingerprint,network,ics,s7comm

tcp:
  - inputs:
      - data: "\x03\x00\x00\x16\x11\xd0\x00\x01\x00\x01\x00\xc1\x02\x01\x00\xc2\x02\x01\x02\xc0\x01\x09"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 102
    matchers:
      - type: word
        part: raw
        words:
          - "\x03\x00\x00\x16"
          - "\xd0"
        condition: and
