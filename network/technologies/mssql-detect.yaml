id: mssql-detect

info:
  name: Microsoft SQL Server Detect
  author: internal
  severity: info
  description: Detects MSSQL service via TDS banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,mssql,database

tcp:
  - inputs:
      - data: "\x12\x01\x00\x34\x00\x00\x00\x00\x00\x00\x15\x00\x06\x01\x00\x1b\x00\x01\x02\x00\x1c\x00\x0c\x03\x00\x28\x00\x04\xff\x08\x00\x02\x10\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 1433
    matchers:
      - type: word
        part: raw
        words:
          - "MSSQL"
