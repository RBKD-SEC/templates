id: mysql-detect

info:
  name: MySQL Detect
  author: internal
  severity: info
  description: Detects MySQL service via banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,mysql,database

tcp:
  - inputs:
      - data: "\n"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 3306
    matchers:
      - type: word
        part: raw
        words:
          - "mysql_native_password"
          - "5.7"
          - "8.0"
        condition: or
