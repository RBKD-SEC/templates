id: dameng-detect

info:
  name: DM (Dameng) Database Detect
  author: internal
  severity: info
  description: Detects DM (达梦) database service via TCP banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,dameng,database

tcp:
  - inputs:
      - data: "\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 5236
    matchers:
      - type: word
        part: raw
        words:
          - "DM"
          - "Dameng"
          - "DBVERSION"
        condition: or
