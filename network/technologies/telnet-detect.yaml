id: telnet-detect

info:
  name: Telnet Detect
  author: internal
  severity: info
  description: Detects Telnet service via banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,telnet

tcp:
  - inputs:
      - data: "\n"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 23
    matchers:
      - type: word
        part: raw
        words:
          - "login"
          - "Password"
          - "Telnet"
        condition: or
