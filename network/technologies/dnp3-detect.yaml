id: dnp3-detect

info:
  name: DNP3 Detect
  author: internal
  severity: info
  description: Detects DNP3 (Distributed Network Protocol) service via link-layer request.
  metadata:
    max-request: 1
  tags: fingerprint,network,ics,dnp3

tcp:
  - inputs:
      - data: "\x05\x64\x05\xc0\x01\x00\x00\x04\xe9\x24"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 20000
    matchers:
      - type: word
        part: raw
        words:
          - "\x05\x64"
