id: ftp-detect

info:
  name: FTP Detect
  author: internal
  severity: info
  description: Detects FTP service via banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,ftp

tcp:
  - inputs:
      - data: "\n"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 21
    matchers:
      - type: regex
        part: raw
        regex:
          - "^220 .*(FTP|ftp)"
