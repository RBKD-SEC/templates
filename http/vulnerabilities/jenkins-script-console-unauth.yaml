id: jenkins-script-console-unauth

info:
  name: Jenkins Unauthenticated Script Console Access
  author: nuclei-customizer
  severity: critical
  description: |
    The Jenkins instance is configured with anonymous access enabled, allowing unauthenticated
    users to access the Script Console at /script. The Script Console provides a Groovy
    execution environment that can run arbitrary code on the Jenkins master server, including
    OS-level commands. This is a critical misconfiguration that effectively grants remote code
    execution to any network-connected user.

    This template only verifies whether the Script Console page is accessible without
    authentication by checking for characteristic UI elements. It does NOT execute any
    Groovy code or perform any system commands.
  reference:
    - https://www.jenkins.io/doc/book/managing/script-console/
    - https://developer.nvidia.com/blog/exploiting-and-securing-jenkins-instances-at-scale-with-groovywaiter/
    - https://www.cobalt.io/vulnerability-wiki/inf1/network-jenkins-script-console-access
    - https://github.com/rapid7/metasploit-framework/blob/master/modules/exploits/multi/http/jenkins_script_console.rb
    - https://hackerone.com/reports/219877
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-306
    cpe: cpe:2.3:a:jenkins:jenkins:*:*:*:*:*:*:*:*
  metadata:
    verified: false
    max-request: 3
    vendor: jenkins
    product: jenkins
    shodan-query:
      - http.title:"Dashboard [Jenkins]"
      - http.title:"Jenkins"
    fofa-query: app="JENKINS"
  tags: jenkins,unauth,script-console,rce,misconfig,admin,groovy

http:
  - method: GET
    path:
      - "{{BaseURL}}/script"
      - "{{BaseURL}}/script/"
      - "{{BaseURL}}/manage/script"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "Script Console"
          - "Groovy"
        condition: and

      - type: word
        part: body
        words:
          - "<title>Script Console [Jenkins]</title>"
          - "Script Console [Jenkins]"
          - "class='jenkins-panel'"
        condition: or
