id: jboss-jmx-console-exposed

info:
  name: JBoss JMX Console Exposed
  author: internal-audit
  severity: medium
  description: Detects JBoss JMX console accessible without authentication.
  metadata:
    max-request: 1
  tags: http,exposure,jboss,jmx,internal-audit,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/jmx-console/"
    matchers:
      - type: word
        part: body
        words:
          - "JMX Agent View"
          - "jboss"
        condition: and

      - type: status
        status:
          - 200
        condition: and
