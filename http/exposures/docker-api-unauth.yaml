id: docker-api-unauth

info:
  name: Docker Remote API Unauthenticated Access
  author: internal-audit
  severity: high
  description: Detects Docker Remote API exposed without authentication allowing container enumeration.
  metadata:
    max-request: 1
  tags: http,exposure,docker,api,internal-audit,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/containers/json"
    matchers:
      - type: word
        part: body
        words:
          - '"Id"'
          - '"Image"'
        condition: and

      - type: status
        status:
          - 200
        condition: and
