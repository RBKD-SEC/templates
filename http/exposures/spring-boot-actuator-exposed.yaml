# Source: https://github.com/projectdiscovery/nuclei-templates/blob/main/http/misconfiguration/springboot/springboot-actuators.yaml
# Modified: 收敛路径，仅保留高价值 actuator 端点，只读探测

id: spring-boot-actuator-exposed

info:
  name: Spring Boot Actuator Exposed
  author: pdteam
  severity: medium
  description: Detects exposed Spring Boot actuator endpoints (read-only probe).
  metadata:
    max-request: 2
  tags: http,exposure,spring-boot,actuator

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/env"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - '"_links"'
          - '"self"'
        condition: and

      - type: word
        part: body
        words:
          - '"activeProfiles"'
          - '"propertySources"'
        condition: and
