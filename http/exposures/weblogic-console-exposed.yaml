id: weblogic-console-exposed

info:
  name: WebLogic Console Exposed
  author: internal-audit
  severity: medium
  description: Detects Oracle WebLogic Server console accessible without authentication bypass.
  metadata:
    max-request: 1
  tags: http,exposure,weblogic,internal-audit,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/console/login/LoginForm.jsp"
    matchers:
      - type: word
        part: body
        words:
          - "WebLogic Server"
          - "Console"
        condition: and

      - type: status
        status:
          - 200
        condition: and
