# Modified: 收敛 matcher

id: kibana-detect

info:
  name: Kibana Detect
  author: pdteam
  severity: info
  description: Detects Kibana dashboard.
  metadata:
    max-request: 1
  tags: fingerprint,http,kibana,panels

http:
  - method: GET
    path:
      - "{{BaseURL}}/app/kibana"
      - "{{BaseURL}}/"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - "kibana"
          - "kbnVersion"
        condition: or

      - type: word
        part: header
        words:
          - "kbn-version"
        condition: or
