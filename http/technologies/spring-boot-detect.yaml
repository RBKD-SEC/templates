# Source: https://github.com/projectdiscovery/nuclei-templates/blob/main/http/technologies/springboot-detect.yaml
# Modified: 收敛 matcher，补充内网常见路径

id: spring-boot-detect

info:
  name: Spring Boot Detect
  author: pdteam
  severity: info
  description: Detects Spring Boot via whitelabel error page or actuator banner.
  metadata:
    max-request: 2
  tags: fingerprint,http,spring-boot,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/404-not-found-random"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - '"status"'
          - '"_links"'
        condition: and

      - type: word
        part: body
        words:
          - "Whitelabel Error Page"
          - "This application has no explicit mapping"
        condition: or
