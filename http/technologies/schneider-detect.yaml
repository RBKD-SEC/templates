id: schneider-detect

info:
  name: Schneider ICS Device Detect
  author: internal
  severity: info
  description: Detects Schneider Electric Modicon PLC web interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,schneider,ics

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Schneider"
          - "Modicon"
          - "Quantum"
          - "M340"
        condition: or
