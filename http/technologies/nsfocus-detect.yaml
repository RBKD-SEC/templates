id: nsfocus-detect

info:
  name: Nsfocus Device Detect
  author: internal
  severity: info
  description: Detects Nsfocus (绿盟) security device web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,nsfocus,network-device

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "绿盟"
          - "Nsfocus"
          - "NSFOCUS"
        condition: or
