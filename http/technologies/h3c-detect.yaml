id: h3c-detect

info:
  name: H3C Network Device Detect
  author: internal
  severity: info
  description: Detects H3C/Comware network device Web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,h3c,network-device

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "H3C"
          - "Comware"
        condition: or
