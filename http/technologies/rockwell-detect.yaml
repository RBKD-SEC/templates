id: rockwell-detect

info:
  name: Rockwell ICS Device Detect
  author: internal
  severity: info
  description: Detects Rockwell Automation (Allen-Bradley) industrial device web interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,rockwell,ics

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Rockwell"
          - "CompactLogix"
          - "ControlLogix"
          - "Allen-Bradley"
        condition: or
