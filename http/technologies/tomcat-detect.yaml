# Source: https://github.com/projectdiscovery/nuclei-templates/blob/main/http/technologies/apache-tomcat-detect.yaml
# Modified: 收敛 matcher，仅保留高置信度信号

id: tomcat-detect

info:
  name: Apache Tomcat Detect
  author: pdteam
  severity: info
  description: Detects Apache Tomcat via title, header or favicon.
  metadata:
    max-request: 2
  tags: fingerprint,http,tomcat,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/favicon.ico"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - "Apache Tomcat"
          - "Tomcat Manager"
        condition: or

      - type: word
        part: header
        words:
          - "Apache-Coyote"
        condition: or

      - type: dsl
        dsl:
          - "status_code==200 && ('1248' == mmh3(base64(body)))"
        condition: or
