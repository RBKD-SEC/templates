id: topsec-detect

info:
  name: TopSec Device Detect
  author: internal
  severity: info
  description: Detects TopSec (天融信) firewall web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,topsec,network-device

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "TopSec"
          - "TOPSEC"
          - "天融信"
        condition: or
