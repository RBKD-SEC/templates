id: huawei-detect

info:
  name: Huawei Network Device Detect
  author: internal
  severity: info
  description: Detects Huawei network device web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,huawei,network-device

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Huawei"
          - "HuaWei"
          - "HuaweiSec"
        condition: or
