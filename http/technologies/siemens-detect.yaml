id: siemens-detect

info:
  name: Siemens ICS Device Detect
  author: internal
  severity: info
  description: Detects Siemens SIMATIC/Scalance industrial device web interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,siemens,ics

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "SIMATIC"
          - "Siemens"
          - "Scalance"
          - "SINEMA"
        condition: or
