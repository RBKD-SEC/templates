id: harbor-detect

info:
  name: Harbor Detect
  author: internal
  severity: info
  description: Detects VMware Harbor registry via title.
  metadata:
    max-request: 1
  tags: fingerprint,http,harbor,devops

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Harbor"
          - "vmware"
        condition: and
