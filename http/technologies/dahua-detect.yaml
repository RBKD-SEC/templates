id: dahua-detect

info:
  name: Dahua Camera Detect
  author: internal
  severity: info
  description: Detects Dahua camera or NVR login page.
  metadata:
    max-request: 1
  tags: fingerprint,http,dahua,camera

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Dahua"
          - "dahua"
          - "Login"
        condition: or
