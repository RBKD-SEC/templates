id: weblogic-detect

info:
  name: WebLogic Detect
  author: internal
  severity: info
  description: Detects Oracle WebLogic Server console.
  metadata:
    max-request: 1
  tags: fingerprint,http,weblogic,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/console/login/LoginForm.jsp"
    matchers:
      - type: word
        part: body
        words:
          - "WebLogic"
          - "Oracle"
        condition: and
