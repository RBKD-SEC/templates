id: kafka-detect

info:
  name: Kafka Detect
  author: internal
  severity: info
  description: Detects Kafka Connect or Kafka Manager panel.
  metadata:
    max-request: 1
  tags: fingerprint,http,kafka,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Kafka Connect UI"
          - "Kafka Manager"
          - "Cruise Control"
        condition: or
