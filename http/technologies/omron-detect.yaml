id: omron-detect

info:
  name: Omron ICS Device Detect
  author: internal
  severity: info
  description: Detects Omron industrial device web interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,omron,ics

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Omron"
          - "NJ-Series"
          - "NX-Series"
          - "CJ2M"
        condition: or
