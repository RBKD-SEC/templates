id: ge-detect

info:
  name: GE ICS Device Detect
  author: internal
  severity: info
  description: Detects GE industrial device web interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,ge,ics

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "PACSystems"
          - "RX3i"
          - "VersaMax"
          - "GE Intelligent"
        condition: or
