id: apusic-detect

info:
  name: Apusic Application Server Detect
  author: internal
  severity: info
  description: Detects Apusic (金蝶天燕) application server web management interface.
  metadata:
    max-request: 2
  tags: fingerprint,http,apusic,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/admin/"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - "Apusic"
          - "金蝶天燕"
          - "AAS"
        condition: or
