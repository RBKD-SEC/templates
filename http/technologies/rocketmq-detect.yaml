id: rocketmq-detect

info:
  name: RocketMQ Detect
  author: internal
  severity: info
  description: Detects RocketMQ Console panel.
  metadata:
    max-request: 1
  tags: fingerprint,http,rocketmq,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "RocketMQ"
          - "rocketmq"
        condition: or
