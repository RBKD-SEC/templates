id: tongweb-detect

info:
  name: TongWeb Detect
  author: internal
  severity: info
  description: Detects TongWeb (东方通) application server web management interface.
  metadata:
    max-request: 2
  tags: fingerprint,http,tongweb,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/tongweb/"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - "TongWeb"
          - "东方通"
          - "TongTech"
        condition: or
