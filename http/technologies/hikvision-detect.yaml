id: hikvision-detect

info:
  name: Hikvision Camera Detect
  author: internal
  severity: info
  description: Detects Hikvision camera or NVR login page.
  metadata:
    max-request: 1
  tags: fingerprint,http,hikvision,camera

http:
  - method: GET
    path:
      - "{{BaseURL}}/doc/page/login.asp"
    matchers:
      - type: word
        part: body
        words:
          - "Hikvision"
          - "iVMS"
        condition: or
