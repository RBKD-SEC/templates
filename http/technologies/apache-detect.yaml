id: apache-detect

info:
  name: Apache HTTP Server Detect
  author: internal
  severity: info
  description: Detects Apache HTTP Server via header or default page.
  metadata:
    max-request: 1
  tags: fingerprint,http,apache,middleware

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: header
        words:
          - "Apache"

      - type: word
        part: body
        words:
          - "It works!"
          - "Apache HTTP Server"
        condition: or
