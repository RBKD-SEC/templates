id: qianxin-detect

info:
  name: Qianxin Device Detect
  author: internal
  severity: info
  description: Detects Qianxin (奇安信) firewall web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,qianxin,network-device

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "奇安信"
          - "Qianxin"
          - "NGFW"
        condition: or
