id: harbor-mini-brute

info:
  name: Harbor Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Harbor credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,harbor,devops,internal-audit,optional

http:
  - raw:
      - |
        POST /c/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        principal={{username}}&password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - admin
        - harbor
      password:
        - Harbor12345
        - admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
          - 303

      - type: word
        part: header
        words:
          - "location:"

      - type: word
        part: body
        words:
          - "Invalid"
          - "incorrect"
        negative: true
        condition: or
