id: zabbix-mini-brute

info:
  name: Zabbix Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Zabbix admin credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,zabbix,panels,internal-audit,optional

http:
  - raw:
      - |
        POST /index.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        name={{username}}&password={{password}}&enter=Sign+in

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - Admin
        - admin
      password:
        - zabbix
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302

      - type: word
        part: header
        words:
          - "location:"

      - type: word
        part: body
        words:
          - "Incorrect"
          - "Login"
        negative: true
        condition: or
