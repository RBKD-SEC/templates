id: topsec-mini-brute

info:
  name: TopSec Device Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default TopSec (天融信) device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,topsec,network-device,internal-audit,optional

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - superadmin
        - admin
      password:
        - talent
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "TopSec"
          - "TOPSEC"
          - "天融信"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
          - "登录失败"
        negative: true
        condition: or
