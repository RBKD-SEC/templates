id: dahua-mini-brute

info:
  name: Dahua Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Dahua camera credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,dahua,camera

http:
  - raw:
      - |
        GET /cgi-bin/login.cgi HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - user
      password:
        - admin
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "index"
          - "main"
        condition: or

      - type: word
        part: body
        words:
          - "Invalid"
          - "Unauthorized"
        negative: true
        condition: or
