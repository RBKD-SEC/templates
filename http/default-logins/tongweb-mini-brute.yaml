id: tongweb-mini-brute

info:
  name: TongWeb Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default TongWeb (东方通) credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,tongweb,middleware,internal-audit,optional

http:
  - raw:
      - |
        POST /tongweb/j_security_check HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        j_username={{username}}&j_password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - admin
        - webadmin
      password:
        - admin
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
          - 303

      - type: word
        part: header
        words:
          - "location:"

      - type: word
        part: body
        words:
          - "Invalid"
          - "failed"
          - "登录失败"
        negative: true
        condition: or
