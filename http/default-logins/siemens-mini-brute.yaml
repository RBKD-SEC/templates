id: siemens-mini-brute

info:
  name: Siemens ICS Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Siemens ICS device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
    WARNING: ICS devices may be sensitive to login attempts. Use with caution.
  metadata:
    max-request: 4
  tags: http,default-login,siemens,ics,internal-audit,optional

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - Administrator
        - USER
      password:
        - admin
        - user
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "SIMATIC"
          - "Siemens"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
        negative: true
        condition: or
