id: sangfor-mini-brute

info:
  name: Sangfor Device Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Sangfor (深信服) device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,sangfor,network-device

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - admin
      password:
        - sangfor
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "Sangfor"
          - "深信服"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
          - "登录失败"
        negative: true
        condition: or
