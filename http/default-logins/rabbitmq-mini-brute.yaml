id: rabbitmq-mini-brute

info:
  name: RabbitMQ Management Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default RabbitMQ Management console credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,rabbitmq,internal-audit,optional

http:
  - raw:
      - |
        GET /api/whoami HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - guest
        - admin
      password:
        - guest
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - '"name"'
          - '"tags"'
        condition: and

      - type: word
        part: body
        words:
          - "not_authorised"
          - "Unauthorized"
        negative: true
        condition: or
