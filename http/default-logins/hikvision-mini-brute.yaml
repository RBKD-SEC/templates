id: hikvision-mini-brute

info:
  name: Hikvision Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Hikvision camera credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,hikvision,camera

http:
  - raw:
      - |
        GET /ISAPI/Security/userCheck?time={{rand_int(1000,9999)}} HTTP/1.1
        Host: {{Hostname}}
        Authorization: Digest {{username}} {{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - user
      password:
        - admin12345
        - 12345
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "<userCheck>"
          - "<statusValue>200</statusValue>"
        condition: and
