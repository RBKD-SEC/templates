id: apusic-mini-brute

info:
  name: Apusic Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Apusic (金蝶天燕) application server credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,apusic,middleware

http:
  - raw:
      - |
        POST /admin/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username={{username}}&password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - apusic
      password:
        - admin
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 302

      - type: word
        part: body
        words:
          - "Apusic"
          - "金蝶天燕"
          - "success"
        condition: or

      - type: word
        part: body
        words:
          - "Invalid"
          - "failed"
          - "登录失败"
        negative: true
        condition: or
