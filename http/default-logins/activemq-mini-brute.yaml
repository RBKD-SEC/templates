id: activemq-mini-brute

info:
  name: ActiveMQ Console Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default ActiveMQ console credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,activemq,internal-audit,optional

http:
  - raw:
      - |
        GET /admin/ HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - admin
        - user
      password:
        - admin
        - activemq
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "ActiveMQ"
          - "Welcome"
        condition: and

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
        negative: true
        condition: or
