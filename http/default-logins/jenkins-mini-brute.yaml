id: jenkins-mini-brute

info:
  name: Jenkins Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Jenkins credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,jenkins,devops,internal-audit,optional

http:
  - raw:
      - |
        POST /j_acegi_security_check HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        j_username={{username}}&j_password={{password}}&from=%2F&Submit=Sign+in

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - admin
        - jenkins
      password:
        - admin
        - jenkins
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
          - 303

      - type: word
        part: header
        words:
          - "location:"

      - type: word
        part: body
        words:
          - "Invalid"
          - "loginError"
          - "Authentication"
        negative: true
        condition: or
