id: ruijie-mini-brute

info:
  name: Ruijie Device Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Ruijie network device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,ruijie,network-device,internal-audit,optional

http:
  - raw:
      - |
        POST /login.asp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username={{username}}&password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - admin
        - admin
      password:
        - admin
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 302

      - type: word
        part: body
        words:
          - "Ruijie"
          - "RG-"
          - "success"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
          - "зЩїељХе§±иі•"
          - "еѓЖз†БйФЩиѓѓ"
        negative: true
        condition: or
