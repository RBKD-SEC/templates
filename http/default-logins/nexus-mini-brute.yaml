id: nexus-mini-brute

info:
  name: Nexus Repository Manager Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Nexus credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,nexus,devops,internal-audit,optional

http:
  - raw:
      - |
        POST /service/rapture/session HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username={{username}}&password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    delay: 2s
    payloads:
      username:
        - admin
        - nexus
      password:
        - admin123
        - nexus
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 204
          - 200

      - type: word
        part: header
        words:
          - "Set-Cookie"

      - type: word
        part: body
        words:
          - "Incorrect username"
          - "authentication failed"
        negative: true
        condition: or
