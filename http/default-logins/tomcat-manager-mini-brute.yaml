id: tomcat-manager-mini-brute

info:
  name: Tomcat Manager Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Tomcat Manager credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,tomcat,middleware

http:
  - raw:
      - |
        POST /manager/j_security_check HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        j_username={{username}}&j_password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - tomcat
        - admin
      password:
        - tomcat
        - admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
          - 303

      - type: word
        part: header
        words:
          - "location:"

      - type: word
        part: body
        words:
          - "Invalid"
          - "failed"
        negative: true
        condition: or
