id: abb-mini-brute

info:
  name: ABB ICS Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default ABB ICS device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
    WARNING: ICS devices may be sensitive to login attempts. Use with caution.
  metadata:
    max-request: 4
  tags: http,default-login,abb,ics

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - default
      password:
        - admin
        - default
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "ABB"
          - "AC500"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
        negative: true
        condition: or
