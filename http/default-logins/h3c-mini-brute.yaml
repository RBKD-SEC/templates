id: h3c-mini-brute

info:
  name: H3C Device Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default H3C network device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,h3c,network-device

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - user
      password:
        - admin
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "H3C"
          - "Comware"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
        negative: true
        condition: or
