id: huawei-mini-brute

info:
  name: Huawei Device Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Huawei network device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,huawei,network-device

http:
  - raw:
      - |
        POST /login.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username={{username}}&password={{password}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - admin
      password:
        - admin
        - admin@123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 302

      - type: word
        part: body
        words:
          - "Huawei"
          - "HuaWei"
          - "success"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
          - "зЩїељХе§±иі•"
          - "еѓЖз†БйФЩиѓѓ"
        negative: true
        condition: or
