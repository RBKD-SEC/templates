id: grafana-mini-brute

info:
  name: Grafana Mini Brute - 2x2 Dictionary
  author: internal
  severity: high
  description: |
    Detects weak/default Grafana credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,grafana,panels

http:
  - raw:
      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"user":"{{username}}","password":"{{password}}"}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - grafana
      password:
        - admin
        - grafana
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "grafana_session"

      - type: word
        part: body
        words:
          - '"message":"Invalid username or password"'
        negative: true
