id: nsfocus-mini-brute

info:
  name: Nsfocus Device Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default Nsfocus (зїњзЫЯ) device credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,nsfocus,network-device,internal-audit,optional

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username+":"+password)}}

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - admin
        - admin
      password:
        - nsfocus
        - admin123
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "зїњзЫЯ"
          - "Nsfocus"
          - "NSFOCUS"
        condition: or

      - type: word
        part: body
        words:
          - "Unauthorized"
          - "Authentication"
          - "зЩїељХе§±иі•"
        negative: true
        condition: or
