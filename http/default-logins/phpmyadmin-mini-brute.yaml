id: phpmyadmin-mini-brute

info:
  name: phpMyAdmin Mini Brute - 2x2 Dictionary
  author: internal-audit
  severity: high
  description: |
    Detects weak/default phpMyAdmin credentials using a minimal 2-user x 2-password dictionary.
    MAX 4 ATTEMPTS. Stops at first match.
  metadata:
    max-request: 4
  tags: http,default-login,phpmyadmin,database,internal-audit,optional

http:
  - raw:
      - |
        POST /index.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        pma_username={{username}}&pma_password={{password}}&server=1

    attack: pitchfork
    stop-at-first-match: true
    threads: 1
    payloads:
      username:
        - root
        - admin
      password:
        - root
        - admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
          - 303
          - 200

      - type: word
        part: body
        words:
          - "main.php"
          - "navigation.php"
          - "db_structure.php"
        condition: or

      - type: word
        part: body
        words:
          - "Access denied"
          - "Cannot log in"
          - "mysqli_real_connect"
        negative: true
        condition: or
