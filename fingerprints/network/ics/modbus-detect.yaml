id: modbus-detect

info:
  name: Modbus TCP Detect
  author: internal-audit
  severity: info
  description: Detects Modbus TCP service via MEI (Function Code 43) Read Device Identification.
  metadata:
    max-request: 1
  tags: fingerprint,network,ics,modbus,internal-audit

tcp:
  - inputs:
      - data: "\x00\x00\x00\x00\x00\x05\x01\x2b\x0e\x01\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 502
    matchers:
      - type: word
        part: raw
        words:
          - "\x2b\x0e"
