id: mms-detect

info:
  name: MMS (IEC 61850) Detect
  author: internal-audit
  severity: info
  description: Detects MMS (Manufacturing Message Specification / IEC 61850) via ISO COTP + Session handshake on port 102.
  metadata:
    max-request: 1
  tags: fingerprint,network,ics,mms,internal-audit

tcp:
  - inputs:
      - data: "\x03\x00\x00\x16\x11\xd0\x00\x01\x00\x01\x00\xc1\x02\x01\x00\xc2\x02\x01\x02\xc0\x01\x09"
        read: 14
      - data: "\x03\x00\x00\x0f\x02\xf0\x80\x32\x01\x00\x00\x00\x00\x00\x08\x00\x00\x00\x00"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 102
    matchers:
      - type: word
        part: raw
        words:
          - "\x03\x00\x00\x16"
          - "\xd0"
        condition: and
      - type: word
        part: raw
        words:
          - "\x32\x03"
          - "\xf0\x80"
        condition: or
        negative: true
