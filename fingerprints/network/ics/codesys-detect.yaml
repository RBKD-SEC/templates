id: codesys-detect

info:
  name: CODESYS Runtime Detect
  author: internal-audit
  severity: info
  description: Detects CODESYS PLC runtime via TCP banner.
  metadata:
    max-request: 1
  tags: fingerprint,network,ics,codesys,internal-audit

tcp:
  - inputs:
      - data: "\n"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 1200
    matchers:
      - type: word
        part: raw
        words:
          - "CODESYS"
          - "3S"
          - "CoDeSys"
        condition: or
