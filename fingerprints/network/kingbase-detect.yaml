id: kingbase-detect

info:
  name: KingBaseES Database Detect
  author: internal-audit
  severity: info
  description: Detects KingBaseES (人大金仓) database service via PostgreSQL wire protocol.
  metadata:
    max-request: 1
  tags: fingerprint,network,kingbase,database,internal-audit

tcp:
  - inputs:
      - data: "\x00\x00\x00\x08\x04\xd2\x16\x2f"
        read: 1024
    host:
      - "{{Hostname}}"
    port: 54321
    matchers:
      - type: word
        part: raw
        words:
          - "KingbaseES"
          - "KINGBASE"
          - "kingbase"
        condition: or
