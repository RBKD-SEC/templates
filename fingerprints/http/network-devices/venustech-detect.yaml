id: venustech-detect

info:
  name: Venustech Device Detect
  author: internal-audit
  severity: info
  description: Detects Venustech (启明星辰) security device web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,venustech,network-device,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "启明星辰"
          - "Venustech"
          - "天镜"
        condition: or
