id: sangfor-detect

info:
  name: Sangfor Device Detect
  author: internal-audit
  severity: info
  description: Detects Sangfor (深信服) firewall/VPN web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,sangfor,network-device,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Sangfor"
          - "深信服"
          - "SSL VPN"
        condition: or
