id: minio-detect

info:
  name: MinIO Detect
  author: internal-audit
  severity: info
  description: Detects MinIO object storage console.
  metadata:
    max-request: 1
  tags: fingerprint,http,minio,panels,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/minio/login"
    matchers:
      - type: word
        part: body
        words:
          - "MinIO"
          - "minio"
        condition: or
