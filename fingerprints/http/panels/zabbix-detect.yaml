id: zabbix-detect

info:
  name: Zabbix Detect
  author: internal-audit
  severity: info
  description: Detects Zabbix monitoring panel.
  metadata:
    max-request: 1
  tags: fingerprint,http,zabbix,panels,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Zabbix"
          - "zabbix"
        condition: or
