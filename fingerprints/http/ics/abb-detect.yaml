id: abb-detect

info:
  name: ABB ICS Device Detect
  author: internal-audit
  severity: info
  description: Detects ABB industrial device web interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,abb,ics,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "ABB"
          - "AC500"
          - "PM5xx"
        condition: or
