id: bes-detect

info:
  name: BES Application Server Detect
  author: internal-audit
  severity: info
  description: Detects BES (宝兰德) application server web management interface.
  metadata:
    max-request: 1
  tags: fingerprint,http,bes,middleware,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "BES Application Server"
          - "宝兰德"
          - "BesWebServer"
        condition: or
