id: jboss-detect

info:
  name: JBoss Detect
  author: internal-audit
  severity: info
  description: Detects JBoss/WildFly application server.
  metadata:
    max-request: 1
  tags: fingerprint,http,jboss,middleware,internal-audit

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "JBoss"
          - "WildFly"
        condition: or
