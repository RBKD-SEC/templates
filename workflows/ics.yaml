id: ics

info:
  name: ICS/SCADA Workflow
  author: internal-audit
  description: |
    Industrial control system protocol fingerprinting + optional device web login brute.
    Covers Modbus, IEC 104, S7comm, DNP3, CODESYS, MMS.
    Covers ICS vendors: Siemens, Schneider, ABB, Rockwell, GE, Omron.
    WARNING: optional templates may trigger account lockout or login alerts.
    WARNING: ICS devices may be sensitive to scan traffic. Use with extreme caution.
  tags: workflow,internal-audit,ics,optional

workflows:
  - tags: fingerprint,ics,internal-audit
  - tags: safe,ics,internal-audit
  - tags: optional,ics,internal-audit
